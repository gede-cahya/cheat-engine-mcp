name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check
      - run: cargo test
      - run: cargo check
      - run: cargo build --release
      - run: cargo check
        working-directory: examples/dummy-target
